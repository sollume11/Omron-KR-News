name: OMRON 뉴스 주간 자동 업데이트

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: 주간 뉴스 수집 및 HTML 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_news.py

      - name: 결과 커밋 및 배포
        run: |
          git config user.name "OMRON News Bot"
          git config user.email "bot@omron-news.local"
          git add docs/index.html docs/index_ja.html
          git diff --staged --quiet || git commit -m "뉴스 업데이트 $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')"
          git pull --rebase origin main
          git push
